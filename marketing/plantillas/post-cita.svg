<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- POST "FICHA DE CAMPO" — dicho de productor, sobre café tinta -->
  <rect width="1080" height="1080" fill="#2E2014"/>
  <rect x="70" y="70" width="940" height="940" fill="none" stroke="#D9A03F" stroke-width="3"/>
  <rect x="88" y="88" width="904" height="904" fill="none" stroke="#D9A03F" stroke-width="1"/>

  <text x="140" y="215" font-family="'IBM Plex Mono','Courier New',monospace" font-size="28" letter-spacing="8" fill="#D9A03F">FICHA DE CAMPO · No. 03</text>
  <line x1="140" y1="250" x2="940" y2="250" stroke="#D9A03F" stroke-width="1" stroke-dasharray="8 8"/>

  <text x="150" y="230" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="210" font-weight="900" fill="#B44A24">“</text>

  <text x="140" y="470" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="78" font-weight="900" fill="#FBF6EA">El que no lleva</text>
  <text x="140" y="565" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="78" font-weight="900" fill="#FBF6EA">cuentas, trabaja</text>
  <text x="140" y="660" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="78" font-weight="900" font-style="italic" fill="#D9A03F">de a gratis</text>
  <text x="140" y="755" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="78" font-weight="900" fill="#FBF6EA">y ni se entera.</text>

  <text x="140" y="850" font-family="'IBM Plex Mono','Courier New',monospace" font-size="30" fill="#a8926e">— DICHO DE PRODUCTOR</text>
  <line x1="140" y1="905" x2="940" y2="905" stroke="#D9A03F" stroke-width="1" stroke-dasharray="8 8"/>

  <text x="140" y="965" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="42" font-weight="900" font-style="italic" fill="#FBF6EA">ABONO</text>
  <text x="940" y="965" text-anchor="end" font-family="'IBM Plex Mono','Courier New',monospace" font-size="26" letter-spacing="3" fill="#D9A03F">SABE SI GANASTE.</text>
</svg>

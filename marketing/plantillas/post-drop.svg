<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- POST "AVISO" — convocatoria de 10 invernaderos, estilo cartel de rancho -->
  <rect width="1080" height="1080" fill="#B44A24"/>
  <rect x="60" y="60" width="960" height="960" fill="#FBF6EA"/>
  <rect x="92" y="92" width="896" height="896" fill="none" stroke="#B44A24" stroke-width="4"/>

  <text x="540" y="215" text-anchor="middle" font-family="'IBM Plex Mono','Courier New',monospace" font-size="30" letter-spacing="12" fill="#B44A24">AVISO · PILOTO ABIERTO</text>
  <line x1="150" y1="255" x2="930" y2="255" stroke="#2E2014" stroke-width="3"/>

  <text x="540" y="410" text-anchor="middle" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="88" font-weight="900" fill="#2E2014">Se buscan</text>
  <text x="540" y="560" text-anchor="middle" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="188" font-weight="900" fill="#B44A24">10</text>
  <text x="540" y="670" text-anchor="middle" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="76" font-weight="900" font-style="italic" fill="#2E2014">invernaderos</text>
  <text x="540" y="740" text-anchor="middle" font-family="'IBM Plex Mono','Courier New',monospace" font-size="34" letter-spacing="6" fill="#2E2014">DE MICHOACAN</text>

  <line x1="150" y1="800" x2="930" y2="800" stroke="#2E2014" stroke-width="3"/>
  <text x="540" y="865" text-anchor="middle" font-family="'IBM Plex Mono','Courier New',monospace" font-size="30" fill="#2E2014">GRATIS PARA LOS PRIMEROS.</text>
  <text x="540" y="910" text-anchor="middle" font-family="'IBM Plex Mono','Courier New',monospace" font-size="30" fill="#2E2014">¿CONOCES UNO? ETIQUETALO.</text>

  <text x="150" y="965" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="40" font-weight="900" font-style="italic" fill="#2E2014">ABONO</text>
  <text x="930" y="965" text-anchor="end" font-family="'IBM Plex Mono','Courier New',monospace" font-size="24" letter-spacing="3" fill="#B44A24">SABE SI GANASTE.</text>
</svg>

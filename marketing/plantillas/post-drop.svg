<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Helvetica, Arial, sans-serif">
  <!-- POST "EL DROP" — la convocatoria de los 10 invernaderos (cierre de lanzamiento) -->
  <defs>
    <linearGradient id="verde" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1ba05a"/><stop offset="1" stop-color="#0e6c39"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#verde)"/>
  <!-- chip superior -->
  <rect x="120" y="140" width="420" height="70" rx="35" fill="#ffffff" opacity=".16"/>
  <text x="330" y="187" font-size="32" font-weight="800" letter-spacing="4" fill="#ffffff" text-anchor="middle">PILOTO ABIERTO</text>
  <!-- titular (EDITAR si cambia la meta) -->
  <text x="120" y="380" font-size="96" font-weight="900" fill="#ffffff">Busco</text>
  <text x="120" y="500" font-size="96" font-weight="900" fill="#ffffff">10 invernaderos</text>
  <text x="120" y="620" font-size="96" font-weight="900" fill="#ffffff">de Michoacán.</text>
  <!-- apoyo -->
  <text x="120" y="740" font-size="40" font-weight="600" fill="#d9ecdf">Gratis para los primeros.</text>
  <text x="120" y="798" font-size="40" font-weight="600" fill="#d9ecdf">¿Conoces uno? Etiquétalo.</text>
  <!-- footer marca -->
  <circle cx="152" cy="965" r="40" fill="#ffffff"/>
  <path d="M152 989 V965" stroke="#168a4b" stroke-width="7" stroke-linecap="round"/>
  <path d="M152 973 C136 973 126 962 126 946 C144 946 152 957 152 973 Z" fill="#168a4b"/>
  <path d="M152 965 C168 965 178 954 178 938 C160 938 152 949 152 965 Z" fill="#168a4b"/>
  <text x="220" y="980" font-size="48" font-weight="900" font-style="italic" letter-spacing="4" fill="#ffffff">ABONO</text>
  <text x="1000" y="980" font-size="32" font-weight="700" fill="#d9ecdf" text-anchor="end">Sabe si ganaste.</text>
</svg>

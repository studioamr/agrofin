<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- POST "TICKET" — el dato como recibo de báscula. Edita la pregunta y el folio -->
  <rect width="1080" height="1080" fill="#F2EAD9"/>
  <rect x="140" y="80" width="800" height="920" fill="#FBF6EA" stroke="#2E2014" stroke-width="3"/>
  <line x1="140" y1="80" x2="940" y2="80" stroke="#2E2014" stroke-width="8" stroke-dasharray="18 12"/>
  <line x1="140" y1="1000" x2="940" y2="1000" stroke="#2E2014" stroke-width="8" stroke-dasharray="18 12"/>

  <text x="540" y="190" text-anchor="middle" font-family="'IBM Plex Mono','Courier New',monospace" font-size="34" font-weight="700" letter-spacing="10" fill="#2E2014">ABONO · BASCULA DE DATOS</text>
  <text x="540" y="245" text-anchor="middle" font-family="'IBM Plex Mono','Courier New',monospace" font-size="26" letter-spacing="6" fill="#8a7a63">FOLIO 0001 · MICHOACAN, MX</text>
  <line x1="220" y1="290" x2="860" y2="290" stroke="#2E2014" stroke-width="2" stroke-dasharray="10 8"/>

  <text x="220" y="430" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="82" font-weight="900" fill="#2E2014">¿Sabes cuánto</text>
  <text x="220" y="535" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="82" font-weight="900" fill="#2E2014">te costó producir</text>
  <text x="220" y="640" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="82" font-weight="900" font-style="italic" fill="#B44A24">cada kilo?</text>

  <line x1="220" y1="710" x2="860" y2="710" stroke="#2E2014" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="220" y="785" font-family="'IBM Plex Mono','Courier New',monospace" font-size="34" fill="#2E2014">LA MAYORIA NO LO SABE.</text>
  <text x="220" y="840" font-family="'IBM Plex Mono','Courier New',monospace" font-size="34" fill="#2E2014">Y AHI SE VA LA GANANCIA.</text>

  <text x="220" y="945" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="44" font-weight="900" font-style="italic" fill="#2E2014">ABONO</text>
  <text x="860" y="945" text-anchor="end" font-family="'IBM Plex Mono','Courier New',monospace" font-size="26" letter-spacing="4" fill="#B44A24">SABE SI GANASTE.</text>
</svg>
